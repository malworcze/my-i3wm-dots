#################################
#           Animations          #
#      (Your Original Logic)    #
#################################

#################################
#           Animations          #
#################################
animations = true;
animation-stiffness = 300.0;
animation-dampening = 25.0;
animation-clamping = true;
animation-mass = 1;

animation-for-open-window = "none";
animation-for-unmap-window = "none";

# 3. Transient windows (popups/menus)
animation-for-transient-window = "zoom";

#################################
#           Fading              #
#    (Controls the Close Speed) #
#################################
fading = true;
# Lower values make the fade-out slower/smoother
fade-in-step = 0.03;
fade-out-step = 0.03;
fade-delta = 5;

#################################
#             Shadows           #
#     (Disabled for Sharpness)  #
#################################
shadow = false;

#################################
#           Fading              #
#################################
fading = true;
fade-in-step = 0.03;
fade-out-step = 0.03;

#################################
#   Transparency / Opacity      #
#################################
inactive-opacity = 0.95;
frame-opacity = 1.0;
inactive-opacity-override = false;

opacity-rule = [
  "94:class_g = 'Geany'",
  "90:class_g = 'kitty' && !focused",
  "100:class_g = 'kitty' && focused",
  "90:class_g = 'Polybar'",
  "85:class_g = 'Rofi",
];

#################################
#           Corners             #
#################################
corner-radius = 0;
rounded-corners-exclude = [
  "window_type = 'dock'",
  "window_type = 'desktop'"
];

#################################
#     Background Blurring       #
#     (For Frosted Glass)       #
#################################
backend = "gll";
blur-method = "dual_kawase";
blur-strength = 2;

blur-background = false;
blur-background-frame = false;
blur-background-fixed = false;

blur-background-exclude = [ 
  # Standard exclusions to prevent glitches
  "window_type = 'dock'",
  "window_type = 'desktop'",
  "_GTK_FRAME_EXTENTS@:c"
];

#################################
#       General Settings        #
#################################
vsync = true;
mark-wmwin-focused = true;
mark-ovredir-focused = true;
detect-rounded-corners = true;
detect-client-opacity = true;
detect-transient = true;
use-damage = true;
log-level = "warn";

wintypes:
{
  tooltip = { fade = true; shadow = false; opacity = 0.95; focus = true; };
  dock = { shadow = false; clip-shadow-above = true; }
  dnd = { shadow = false; }
  popup_menu = { opacity = 0.95; }
  dropdown_menu = { opacity = 0.95; }
};
